<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RRR Tools">
<meta name="theme-color" content="#2c6da2">
<meta name="description" content="RRR Tools – Strumenti CGN">
<title>RRR Tools</title>
<link rel="apple-touch-icon" id="apple-touch-icon-main">

<style>
  @font-face { font-family:'Roboto'; font-style:normal; font-weight:300; src:local('Roboto Light'),local('Roboto-Light'); }
  @font-face { font-family:'Roboto'; font-style:normal; font-weight:400; src:local('Roboto'),local('Roboto-Regular'); }
  @font-face { font-family:'Roboto'; font-style:normal; font-weight:500; src:local('Roboto Medium'),local('Roboto-Medium'); }
  @font-face { font-family:'Roboto'; font-style:normal; font-weight:700; src:local('Roboto Bold'),local('Roboto-Bold'); }
  @font-face { font-family:'Roboto'; font-style:normal; font-weight:900; src:local('Roboto Black'),local('Roboto-Black'); }
</style>

<style>
  :root {
    --brand:       #2c6da2;
    --brand-dark:  #1f4f78;
    --brand-light: #5b99c9;
    --brand-bg:    #eef5fb;
    --text:        #3b3b3b;
    --muted:       #7a8d9e;
    --white:       #ffffff;
    --surface:     #f5f8fb;
    --border:      #c5d8ea;
    --shadow:      0 2px 16px rgba(44,109,162,0.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { min-height: 100%; min-height: -webkit-fill-available; }

  body {
    font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: var(--surface);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── HEADER ── */
  .header {
    background: var(--brand);
    padding: 14px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 4px solid var(--brand-light);
    gap: 10px;
    padding-top: max(14px, env(safe-area-inset-top, 14px));
  }
  .header-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .header-logo {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-logo svg { width: 24px; height: 24px; }
  .header-left-text { min-width: 0; }
  .header-left-text h1 {
    color: var(--white);
    font-size: clamp(.9rem, 2.6vw, 1.25rem);
    font-weight: 700;
    letter-spacing: .02em;
    line-height: 1.3;
  }
  .header-left-text p {
    color: rgba(255,255,255,0.72);
    font-size: .68rem;
    font-weight: 400;
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .header-badge {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: .68rem;
    color: var(--white);
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px 24px 40px;
    padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
  }

  .section-label {
    width: 100%;
    max-width: 560px;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .10em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-left: 2px;
  }

  /* ── APP GRID ── */
  .app-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    width: 100%;
    max-width: 560px;
  }
  @media (min-width: 500px) {
    .app-grid { grid-template-columns: repeat(4, 1fr); gap: 24px; }
  }

  /* ── APP CARD ── */
  .app-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    background: none;
    padding: 4px;
    border-radius: 18px;
    transition: transform .15s ease, opacity .15s ease;
    outline: none;
  }
  .app-card:focus-visible { box-shadow: 0 0 0 3px var(--brand-light); }
  .app-card:active { transform: scale(0.93); opacity: 0.82; }

  .app-icon {
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 120px;
    border-radius: 22%;
    background: var(--brand);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 18px rgba(44,109,162,0.28), 0 1px 4px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
    transition: box-shadow .15s ease;
  }
  .app-card:hover .app-icon {
    box-shadow: 0 6px 24px rgba(44,109,162,0.38), 0 2px 6px rgba(0,0,0,0.14);
  }
  /* Glossy overlay */
  .app-icon::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 100%);
    border-radius: 22% 22% 0 0;
    pointer-events: none;
  }
  .app-icon svg {
    width: 56%;
    height: 56%;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  /* All icons: same CGN blue */
  .app-icon { background: linear-gradient(145deg, #2c6da2 0%, #1a4e80 100%); }

  .app-name {
    font-size: clamp(.74rem, 2.2vw, .86rem);
    font-weight: 600;
    color: var(--text);
    text-align: center;
    line-height: 1.25;
    letter-spacing: .01em;
    max-width: 110px;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 100%; max-width: 560px;
    height: 1px; background: var(--border);
    margin: 32px 0 28px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 0 16px 24px;
    padding-bottom: max(24px, calc(env(safe-area-inset-bottom, 0px) + 16px));
  }
  .footer p { font-size: .72rem; color: var(--muted); letter-spacing: .03em; }
  .footer p + p { margin-top: 4px; }

  /* ── iOS INSTALL BANNER ── */
  #ios-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--brand); color: #fff;
    padding: 12px 14px;
    padding-bottom: max(12px, calc(env(safe-area-inset-bottom, 0px) + 10px));
    display: flex; align-items: center; gap: 12px;
    z-index: 9999;
    box-shadow: 0 -2px 20px rgba(0,0,0,.35);
    font-family: 'Roboto', sans-serif;
  }
  #ios-banner img { width:42px; height:42px; border-radius:10px; flex-shrink:0; }
  #ios-banner .banner-text { flex:1; }
  #ios-banner .banner-text strong { display:block; font-size:13px; font-weight:700; }
  #ios-banner .banner-text span { font-size:11px; opacity:.85; margin-top:2px; display:block; }
  #ios-banner .banner-close {
    background:none; border:none; color:#fff; font-size:26px;
    cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0;
  }

  /* ── Chrome/Android INSTALL BUTTON ── */
  #install-btn {
    display: none;
    margin: 0 auto;
    background: var(--brand); color: #fff;
    border: none; border-radius: 8px;
    padding: 10px 22px;
    font-size: .85rem; font-weight: 600;
    cursor: pointer; letter-spacing: .04em;
    box-shadow: var(--shadow);
    align-items: center; gap: 8px;
    transition: background .15s;
  }
  #install-btn:hover { background: var(--brand-dark); }
  #install-btn svg { width:18px; height:18px; flex-shrink:0; }
  .install-row {
    width: 100%; max-width: 560px;
    display: flex; justify-content: center;
    margin-top: 4px;
  }
</style>
</head>

<script>
(function () {
  'use strict';

  var LOGO_B64 =  + logo_b64 + ;

  /* ── Generate PWA icon via canvas (same approach as reference PWAs) ── */
  function generateIcon(size, callback) {
    var canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    var ctx = canvas.getContext('2d');

    // Flat brand background
    ctx.fillStyle = '#2c6da2';
    ctx.fillRect(0, 0, size, size);

    var img = new Image();
    img.onload = function () {
      // Logo: 58% height, 82% width constraint, keep aspect ratio
      var logoH_max = size * 0.58;
      var logoW_max = size * 0.82;
      var ratio = img.width / img.height;
      var logoH = logoH_max;
      var logoW = logoH * ratio;
      if (logoW > logoW_max) { logoW = logoW_max; logoH = logoW / ratio; }

      // Text params
      var fontSize = Math.round(size * 0.13);
      var gap = size * 0.03;

      // Vertical centering: logo + gap + text as one block
      var totalH = logoH + gap + fontSize;
      var start_y = (size - totalH) / 2;

      // Draw logo with screen blend (black bg → transparent, white logo → white)
      ctx.globalCompositeOperation = 'screen';
      ctx.drawImage(img, (size - logoW) / 2, start_y, logoW, logoH);

      // Draw text
      ctx.globalCompositeOperation = 'source-over';
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.font = '900 ' + fontSize + 'px Roboto, Arial, sans-serif';
      ctx.fillText('RRR Tools', size / 2, start_y + logoH + gap);

      callback(canvas.toDataURL('image/png'));
    };
    img.onerror = function () {
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = '900 ' + Math.round(size * 0.13) + 'px Roboto, Arial, sans-serif';
      ctx.fillText('RRR Tools', size / 2, size / 2);
      callback(canvas.toDataURL('image/png'));
    };
    img.src = 'data:image/jpeg;base64,' + LOGO_B64;
  }

  /* ── Boot PWA ── */
  generateIcon(192, function (icon192) {
    generateIcon(512, function (icon512) {

      // Manifest
      var manifest = {
        name: 'RRR Tools',
        short_name: 'RRR Tools',
        description: 'RRR Tools – Strumenti CGN',
        start_url: './',
        display: 'standalone',
        background_color: '#2c6da2',
        theme_color: '#2c6da2',
        orientation: 'portrait',
        icons: [
          { src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
          { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
        ]
      };
      var mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      var mLink = document.createElement('link');
      mLink.rel = 'manifest';
      mLink.href = URL.createObjectURL(mBlob);
      document.head.appendChild(mLink);

      // Apple touch icon
      var appleIcon = document.getElementById('apple-touch-icon-main');
      if (appleIcon) appleIcon.href = icon192;

      // Service Worker
      if ('serviceWorker' in navigator) {
        var sw = [
          "self.addEventListener('install',function(){self.skipWaiting();});",
          "self.addEventListener('activate',function(e){e.waitUntil(clients.claim());});",
          "self.addEventListener('fetch',function(e){",
          "  e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));",
          "});"
        ].join('');
        navigator.serviceWorker.register(
          URL.createObjectURL(new Blob([sw], { type: 'application/javascript' }))
        ).catch(function () {});
      }

      // iOS Install Banner
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone && !sessionStorage.getItem('rrr-dismissed')) {
        var banner = document.getElementById('ios-banner');
        var bannerImg = document.getElementById('ios-banner-icon');
        bannerImg.src = icon192;
        banner.style.display = 'flex';
        document.getElementById('ios-banner-close').addEventListener('click', function () {
          banner.style.display = 'none';
          sessionStorage.setItem('rrr-dismissed', '1');
        });
      }

      // Chrome/Android Install Prompt
      var deferredPrompt;
      var installBtn = document.getElementById('install-btn');
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
      });
      installBtn.addEventListener('click', function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function () {
          deferredPrompt = null;
          installBtn.style.display = 'none';
        });
      });
      window.addEventListener('appinstalled', function () {
        installBtn.style.display = 'none';
      });

    });
  });

})();
</script>
</body>
</html>
