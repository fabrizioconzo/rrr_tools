<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RRR Tools">

<meta name="description" content="RRR Tools – Strumenti CGN">
<title>RRR Tools</title>

<style>
  @font-face { font-family:"Roboto"; font-style:normal; font-weight:300; src:local("Roboto Light"),local("Roboto-Light"); }
  @font-face { font-family:"Roboto"; font-style:normal; font-weight:400; src:local("Roboto"),local("Roboto-Regular"); }
  @font-face { font-family:"Roboto"; font-style:normal; font-weight:500; src:local("Roboto Medium"),local("Roboto-Medium"); }
  @font-face { font-family:"Roboto"; font-style:normal; font-weight:700; src:local("Roboto Bold"),local("Roboto-Bold"); }
  @font-face { font-family:"Roboto"; font-style:normal; font-weight:900; src:local("Roboto Black"),local("Roboto-Black"); }
</style>

<style>
  :root {
    --brand:       #2c6da2;
    --brand-dark:  #1f4f78;
    --brand-light: #5b99c9;
    --text:        #3b3b3b;
    --muted:       #7a8d9e;
    --white:       #ffffff;
    --surface:     #f5f8fb;
    --border:      #c5d8ea;
    --shadow:      0 2px 16px rgba(44,109,162,0.13);
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; min-height:-webkit-fill-available; }
  body {
    font-family:"Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--surface);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── HEADER ── */
  .header {
    background:var(--brand);
    padding:14px 28px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:4px solid var(--brand-light);
    gap:10px;
    padding-top:max(14px,env(safe-area-inset-top,14px));
  }
  .header-left { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }
  /* mix-blend-mode:screen makes black bg transparent on blue header, white logo stays white */
  .header-left img {
    height:21px;
    display:block;
    flex-shrink:0;
    mix-blend-mode:screen;
  }
  .header-left-text { min-width:0; }
  .header-left-text h1 {
    color:var(--white);
    font-size:clamp(.88rem,2.4vw,1.2rem);
    font-weight:700;
    letter-spacing:.02em;
    line-height:1.35;
  }
  .header-left-text p {
    color:var(--white);
    font-size:.73rem;
    font-weight:300;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-top:3px;
  }
  .header-badge {
    background:rgba(255,255,255,0.15);
    border-radius:20px;
    padding:4px 12px;
    font-size:.68rem;
    color:var(--white);
    font-weight:500;
    letter-spacing:.08em;
    text-transform:uppercase;
    flex-shrink:0;
  }

  @media (min-width:480px) {
    .header { padding:16px 24px 14px !important; border-bottom-width:4px !important; }
    .header-left { gap:18px !important; }
    .header-left img { height:27px !important; }
    .header-left-text h1 { font-size:20px !important; }
    .header-left-text p { font-size:10px !important; letter-spacing:2px !important; margin-top:5px !important; }
  }
  @media (max-width:375px) {
    .header { padding:10px 14px 10px; gap:8px; }
    .header-left { gap:10px; }
    .header-left img { height:17px; }
    .header-left-text h1 { font-size:12px; }
    .header-left-text p { font-size:8px; letter-spacing:1px; }
  }

  /* ── MAIN ── */
  .main {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 24px 40px;
    padding-bottom:max(40px,env(safe-area-inset-bottom,40px));
  }
  .section-label {
    width:100%;
    max-width:560px;
    font-size:.72rem;
    font-weight:700;
    letter-spacing:.10em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:20px;
    padding-left:2px;
  }

  /* ── APP GRID ── */
  .app-grid {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
    width:100%;
    max-width:560px;
  }
  @media (min-width:500px) {
    .app-grid { grid-template-columns:repeat(4,1fr); gap:24px; }
  }

  /* ── APP CARD ── */
  .app-card {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    text-decoration:none;
    cursor:pointer;
    border:none;
    background:none;
    padding:4px;
    border-radius:18px;
    transition:transform .15s ease, opacity .15s ease;
    outline:none;
  }
  .app-card:focus-visible { box-shadow:0 0 0 3px var(--brand-light); }
  .app-card:active { transform:scale(0.93); opacity:0.82; }

  .app-icon {
    width:100%;
    aspect-ratio:1/1;
    max-width:120px;
    border-radius:22%;
    background:linear-gradient(145deg,#2c6da2 0%,#1a4e80 100%);
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 18px rgba(44,109,162,0.28),0 1px 4px rgba(0,0,0,0.12);
    position:relative;
    overflow:hidden;
    transition:box-shadow .15s ease;
  }
  .app-card:hover .app-icon {
    box-shadow:0 6px 24px rgba(44,109,162,0.38),0 2px 6px rgba(0,0,0,0.14);
  }
  .app-icon::after {
    content:"";
    position:absolute;
    top:0; left:0; right:0;
    height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,0.18) 0%,rgba(255,255,255,0) 100%);
    border-radius:22% 22% 0 0;
    pointer-events:none;
  }
  .app-icon svg {
    width:56%;
    height:56%;
    flex-shrink:0;
    position:relative;
    z-index:1;
  }

  .app-name {
    font-size:clamp(.74rem,2.2vw,.86rem);
    font-weight:600;
    color:var(--text);
    text-align:center;
    line-height:1.25;
    letter-spacing:.01em;
    max-width:110px;
  }

  /* ── DIVIDER ── */
  .divider {
    width:100%; max-width:560px;
    height:1px; background:var(--border);
    margin:32px 0 28px;
  }

  /* ── FOOTER ── */
  .footer {
    text-align:center;
    padding:0 16px 24px;
    padding-bottom:max(24px,calc(env(safe-area-inset-bottom,0px) + 16px));
  }
  .footer p { font-size:.72rem; color:var(--muted); letter-spacing:.03em; }
  .footer p + p { margin-top:4px; }

  /* ── iOS INSTALL BANNER ── */
  #ios-banner {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--brand); color:#fff;
    padding:12px 14px;
    padding-bottom:max(12px,calc(env(safe-area-inset-bottom,0px) + 10px));
    display:flex; align-items:center; gap:12px;
    z-index:9999;
    box-shadow:0 -2px 20px rgba(0,0,0,.35);
    font-family:"Roboto",sans-serif;
  }
  #ios-banner img { width:42px; height:42px; border-radius:10px; flex-shrink:0; }
  #ios-banner .banner-text { flex:1; }
  #ios-banner .banner-text strong { display:block; font-size:13px; font-weight:700; }
  #ios-banner .banner-text span { font-size:11px; opacity:.85; margin-top:2px; display:block; }
  #ios-banner .banner-close {
    background:none; border:none; color:#fff; font-size:26px;
    cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0;
  }

  /* ── Chrome/Android INSTALL BUTTON ── */
  #install-btn {
    display:none;
    margin:0 auto;
    background:var(--brand); color:#fff;
    border:none; border-radius:8px;
    padding:10px 22px;
    font-size:.85rem; font-weight:600;
    cursor:pointer; letter-spacing:.04em;
    box-shadow:var(--shadow);
    align-items:center; gap:8px;
    transition:background .15s;
  }
  #install-btn:hover { background:var(--brand-dark); }
  #install-btn svg { width:18px; height:18px; flex-shrink:0; }
  .install-row {
    width:100%; max-width:560px;
    display:flex; justify-content:center;
    margin-top:4px;
  }
</style>
</head>

<script>
(function () {
  "use strict";

  /* ── Favicon generator: 4-squares only, no text, perfectly centred ── */
  function generateFavicon(size) {
    var canvas = document.createElement("canvas");
    canvas.width = canvas.height = size;
    var ctx = canvas.getContext("2d");

    ctx.fillStyle = "#2c6da2";
    ctx.fillRect(0, 0, size, size);

    var gridSize = size * 0.62;
    var innerGap = gridSize * 0.14;
    var sqSize   = (gridSize - innerGap) / 2;
    var sqRadius = sqSize * 0.18;
    var ox       = (size - gridSize) / 2;
    var oy       = (size - gridSize) / 2;

    ctx.fillStyle = "rgba(255,255,255,0.92)";
    [[0,0],[1,0],[0,1],[1,1]].forEach(function(pos) {
      var x = ox + pos[0] * (sqSize + innerGap);
      var y = oy + pos[1] * (sqSize + innerGap);
      var r = sqRadius;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + sqSize - r, y);
      ctx.quadraticCurveTo(x + sqSize, y, x + sqSize, y + r);
      ctx.lineTo(x + sqSize, y + sqSize - r);
      ctx.quadraticCurveTo(x + sqSize, y + sqSize, x + sqSize - r, y + sqSize);
      ctx.lineTo(x + r, y + sqSize);
      ctx.quadraticCurveTo(x, y + sqSize, x, y + sqSize - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    });

    return canvas.toDataURL("image/png");
  }

  /* Set favicon immediately */
  (function () {
    var faviconLink = document.getElementById("favicon-link");
    if (faviconLink) faviconLink.href = generateFavicon(64);
  })();

  /* ── PWA Icon generator: 4-squares design, parameters matching other CGN PWAs ── */
  function generateIcon(size, callback) {
    var canvas = document.createElement("canvas");
    canvas.width = canvas.height = size;
    var ctx = canvas.getContext("2d");

    /* ─ 1. Flat brand background #2c6da2 ─ */
    ctx.fillStyle = "#2c6da2";
    ctx.fillRect(0, 0, size, size);

    /* ─ 2. Compute layout per spec ─ */
    /* Logo block (2×2 grid of squares): 58% height, 82% width max, keep 1:1 ratio */
    var logoH_max = size * 0.58;
    var logoW_max = size * 0.82;
    /* Since ratio is 1:1, logoH = logoW. The constraint that bites first wins. */
    var logoH = Math.min(logoH_max, logoW_max);
    var logoW = logoH;

    var fontSize = Math.round(size * 0.13);
    var gap      = size * 0.03;

    /* Centre the block (logo + gap + text) vertically */
    var totalH = logoH + gap + fontSize;
    var start_y = (size - totalH) / 2;

    /* ─ 3. Draw 4 squares inside logoH×logoW ─ */
    var innerGap = logoH * 0.12;   /* gap between the 4 squares */
    var sqSize   = (logoH - innerGap) / 2;
    var sqRadius = sqSize * 0.18;  /* rounded corners */
    var ox       = (size - logoW) / 2;
    var oy       = start_y;

    ctx.fillStyle = "rgba(255,255,255,0.90)";

    [[0,0],[1,0],[0,1],[1,1]].forEach(function(pos) {
      var x = ox + pos[0] * (sqSize + innerGap);
      var y = oy + pos[1] * (sqSize + innerGap);
      var r = sqRadius;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + sqSize - r, y);
      ctx.quadraticCurveTo(x + sqSize, y,          x + sqSize, y + r);
      ctx.lineTo(x + sqSize, y + sqSize - r);
      ctx.quadraticCurveTo(x + sqSize, y + sqSize, x + sqSize - r, y + sqSize);
      ctx.lineTo(x + r,          y + sqSize);
      ctx.quadraticCurveTo(x,    y + sqSize, x,    y + sqSize - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    });

    /* ─ 4. Draw text "RRR Tools" ─ */
    ctx.fillStyle    = "#ffffff";
    ctx.textAlign    = "center";
    ctx.textBaseline = "top";
    ctx.font         = "900 " + fontSize + "px Roboto, Arial, sans-serif";
    ctx.fillText("RRR Tools", size / 2, start_y + logoH + gap);

    callback(canvas.toDataURL("image/png"));
  }

  /* ── Boot PWA ── */
  generateIcon(192, function (icon192) {
    generateIcon(512, function (icon512) {

      /* Manifest */
      var manifest = {
        name: "RRR Tools",
        short_name: "RRR Tools",
        description: "RRR Tools – Strumenti CGN",
        start_url: "./",
        display: "standalone",
        background_color: "#2c6da2",
        theme_color: "#2c6da2",
        orientation: "portrait",
        icons: [
          { src: icon192, sizes: "192x192", type: "image/png", purpose: "any maskable" },
          { src: icon512, sizes: "512x512", type: "image/png", purpose: "any maskable" }
        ]
      };
      var mBlob = new Blob([JSON.stringify(manifest)], { type: "application/json" });
      var mLink = document.createElement("link");
      mLink.rel  = "manifest";
      mLink.href = URL.createObjectURL(mBlob);
      document.head.appendChild(mLink);

      /* Apple touch icon */
      var appleIcon = document.getElementById("apple-touch-icon-main");
      if (appleIcon) appleIcon.href = icon192;

      /* Service Worker (network-first) */
      if ("serviceWorker" in navigator) {
        var sw = [
          "self.addEventListener('install',function(){self.skipWaiting();});",
          "self.addEventListener('activate',function(e){e.waitUntil(clients.claim());});",
          "self.addEventListener('fetch',function(e){",
          "  e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));",
          "});"
        ].join("");
        navigator.serviceWorker.register(
          URL.createObjectURL(new Blob([sw], { type: "application/javascript" }))
        ).catch(function () {});
      }

      /* ── iOS Install Banner ── */
      var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      var isStandalone = window.navigator.standalone === true;
      if (isIOS && !isStandalone && !sessionStorage.getItem("rrr-dismissed")) {
        var banner    = document.getElementById("ios-banner");
        var bannerImg = document.getElementById("ios-banner-icon");
        bannerImg.src = icon192;
        banner.style.display = "flex";
        document.getElementById("ios-banner-close").addEventListener("click", function () {
          banner.style.display = "none";
          sessionStorage.setItem("rrr-dismissed", "1");
        });
      }

      /* ── Chrome/Android BeforeInstallPrompt ── */
      var deferredPrompt;
      var installBtn = document.getElementById("install-btn");
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = "flex";
      });
      installBtn.addEventListener("click", function () {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function () {
          deferredPrompt = null;
          installBtn.style.display = "none";
        });
      });
      window.addEventListener("appinstalled", function () {
        installBtn.style.display = "none";
      });

    }); /* icon512 */
  }); /* icon192 */

})();
</script>
